<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acceso Demo - Clarins</title>
    <meta name="description" content="Acceso a la landing de demostración con widget ElevenLabs." />
    <link rel="stylesheet" href="/src/login.css" />
  </head>
  <body>
    <main class="login-page">
      <section class="login-card">
        <h1>Acceso demo</h1>
        <p class="login-subtitle">Introduce usuario y contraseña para continuar</p>

        <form id="login-form" novalidate>
          <label for="username">Usuario</label>
          <input id="username" name="username" type="text" autocomplete="username" required />

          <label for="password">Contraseña</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />

          <button type="submit">Entrar</button>
          <p id="login-error" class="login-error" aria-live="polite"></p>
        </form>
      </section>
    </main>
    <script type="module" src="/src/login.js"></script>
  </body>
</html>
